<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mattutini | Esercizi Array e Funzioni</title>
    <style>
        :root {
            --ink: #1f2937;
            --muted: #5f6b7a;
            --paper: #fffef7;
            --panel: rgba(255, 255, 255, 0.84);
            --line: rgba(31, 41, 55, 0.14);
            --sun: #f59e0b;
            --mint: #84cc16;
            --sky: #38bdf8;
            --rose: #fb7185;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Inter, Arial, sans-serif;
            color: var(--ink);
            background:
                linear-gradient(135deg, rgba(245, 158, 11, 0.22), transparent 34%),
                linear-gradient(225deg, rgba(56, 189, 248, 0.2), transparent 40%),
                linear-gradient(180deg, #fff7d6, #d9f99d 48%, #bae6fd);
        }

        .exercise-home-link {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 10;
            padding: 10px 14px;
            border: 2px solid var(--ink);
            border-radius: 8px;
            background: #ffffff;
            color: var(--ink);
            font-family: Consolas, "Courier New", monospace;
            font-weight: 800;
            text-decoration: none;
            box-shadow: 5px 5px 0 var(--sun);
        }

        .shell {
            width: min(1180px, calc(100% - 32px));
            margin: 0 auto;
            padding: 82px 0 56px;
        }

        .hero {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(220px, 320px);
            gap: 24px;
            align-items: stretch;
            margin-bottom: 24px;
        }

        .hero-copy,
        .summary {
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 14px;
            background: var(--panel);
            box-shadow: 0 22px 60px rgba(31, 41, 55, 0.12);
        }

        .hero-copy {
            padding: clamp(28px, 5vw, 54px);
        }

        .eyebrow {
            display: inline-flex;
            margin: 0 0 14px;
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(245, 158, 11, 0.18);
            color: #8a5200;
            font-size: 0.78rem;
            font-weight: 900;
            text-transform: uppercase;
        }

        h1,
        h2,
        h3,
        p {
            margin-top: 0;
        }

        h1 {
            max-width: 820px;
            margin-bottom: 16px;
            font-size: clamp(2.5rem, 7vw, 5.4rem);
            line-height: 0.95;
            letter-spacing: 0;
        }

        .hero-copy p {
            max-width: 720px;
            margin-bottom: 0;
            color: var(--muted);
            font-size: 1.08rem;
            line-height: 1.7;
        }

        .summary {
            display: grid;
            align-content: center;
            gap: 18px;
            padding: 28px;
        }

        .summary strong {
            display: block;
            font-size: 3.8rem;
            line-height: 1;
        }

        .summary span {
            color: var(--muted);
            font-weight: 800;
        }

        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 0 0 24px;
        }

        .filters button {
            min-height: 42px;
            padding: 0 14px;
            border: 1px solid var(--line);
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.74);
            color: var(--ink);
            font: inherit;
            font-weight: 900;
            cursor: pointer;
        }

        .filters button.is-active {
            background: var(--ink);
            color: #ffffff;
        }

        .exercise-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 16px;
        }

        .exercise-card {
            display: flex;
            min-width: 0;
            min-height: 300px;
            flex-direction: column;
            gap: 16px;
            padding: 22px;
            border: 1px solid var(--line);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.84);
            box-shadow: 0 12px 34px rgba(31, 41, 55, 0.08);
        }

        .card-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .level {
            padding: 7px 10px;
            border-radius: 999px;
            color: #ffffff;
            font-size: 0.76rem;
            font-weight: 900;
        }

        .facile .level { background: var(--mint); color: #21330a; }
        .medio .level { background: var(--sun); color: #3a2400; }
        .difficile .level { background: var(--rose); }

        .number {
            color: var(--muted);
            font-family: Consolas, "Courier New", monospace;
            font-weight: 900;
        }

        .exercise-card h2 {
            margin-bottom: 0;
            font-size: 1.35rem;
            line-height: 1.15;
        }

        .exercise-card p {
            color: var(--muted);
            line-height: 1.55;
        }

        output {
            display: block;
            min-height: 58px;
            margin-top: auto;
            padding: 14px;
            border-left: 4px solid var(--sun);
            border-radius: 8px;
            background: #111827;
            color: #e5f9ff;
            font-family: Consolas, "Courier New", monospace;
            font-weight: 800;
            line-height: 1.45;
            overflow-wrap: anywhere;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 920px) {
            .hero,
            .exercise-grid {
                grid-template-columns: 1fr;
            }

            .summary {
                grid-template-columns: repeat(3, minmax(0, 1fr));
            }
        }

        @media (max-width: 620px) {
            .shell {
                padding-top: 76px;
            }

            .summary {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <a class="exercise-home-link" href="../home.html">Home</a>

    <main class="shell">
        <section class="hero">
            <div class="hero-copy">
                <p class="eyebrow">Mattutini JS</p>
                <h1>Array, funzioni e metodi in una dashboard.</h1>
                <p>Qui trovi tutti gli esercizi mattutini ordinati per difficolta, con la traccia sintetica e il risultato gia pronto senza aprire la console.</p>
            </div>
            <aside class="summary" aria-label="Riepilogo esercizi">
                <div>
                    <strong>17</strong>
                    <span>esercizi</span>
                </div>
                <div>
                    <strong>3</strong>
                    <span>livelli</span>
                </div>
                <div>
                    <strong>[]</strong>
                    <span>array focus</span>
                </div>
            </aside>
        </section>

        <nav class="filters" aria-label="Filtri esercizi">
            <button class="is-active" type="button" data-filter="all">Tutti</button>
            <button type="button" data-filter="facile">Facili</button>
            <button type="button" data-filter="medio">Medi</button>
            <button type="button" data-filter="difficile">Difficili</button>
        </nav>

        <section class="exercise-grid" id="exerciseGrid" aria-label="Lista esercizi mattutini"></section>
    </main>

    <script>
        const exercises = [
            {
                level: "facile",
                title: "Aumenta i numeri di 1",
                description: "Da [1, 2, 3, 4, 5] crea un nuovo array con ogni numero aumentato.",
                result: JSON.stringify([1, 2, 3, 4, 5].map((number) => number + 1))
            },
            {
                level: "facile",
                title: "Numeri maggiori di 5",
                description: "Filtra [2, 3, 6, 1, 10] tenendo solo i valori maggiori di 5.",
                result: JSON.stringify([2, 3, 6, 1, 10].filter((number) => number > 5))
            },
            {
                level: "facile",
                title: "Unisci gli array precedenti",
                description: "Concatena il risultato dei primi due esercizi.",
                result: JSON.stringify([6, 11].concat([2, 3, 4, 5, 6]))
            },
            {
                level: "facile",
                title: "Numero piu piccolo",
                description: "Trova il valore piu piccolo dentro [2, 3, 6, 1, 10].",
                result: String(Math.min(...[2, 3, 6, 1, 10]))
            },
            {
                level: "medio",
                title: "Solo stringhe",
                description: "Da un array misto restituisce soltanto gli elementi di tipo stringa.",
                result: JSON.stringify(["ciao", 2, "come", 6, "stai?", 3].filter((item) => typeof item === "string"))
            },
            {
                level: "medio",
                title: "Moltiplica per un numero",
                description: "Moltiplica [5, 7, 9, 2, 5] per 7.",
                result: JSON.stringify([5, 7, 9, 2, 5].map((number) => number * 7))
            },
            {
                level: "medio",
                title: "Raddoppia parametri",
                description: "Raddoppia tutti i numeri di un array.",
                result: JSON.stringify([5, 7, 9, 2, 5].map((number) => number * 2))
            },
            {
                level: "medio",
                title: "Media numerica",
                description: "Calcola la media dei valori in [5, 7, 9, 2, 5].",
                result: String([5, 7, 9, 2, 5].reduce((sum, number) => sum + number, 0) / 5)
            },
            {
                level: "difficile",
                title: "Operazioni tra array",
                description: "Somma gli elementi con lo stesso indice di [1, 2, 3] e [4, 5, 6].",
                result: JSON.stringify([1, 2, 3].map((number, index) => number + [4, 5, 6][index]))
            },
            {
                level: "facile",
                title: "Tipi di dato",
                description: "Per ogni elemento di un array misto stampa il tipo di dato.",
                result: JSON.stringify([10, "testo", true, undefined, null].map((item) => typeof item))
            },
            {
                level: "facile",
                title: "Indici minori di 3",
                description: "Da [10, 20, 30, 40, 50] conserva gli elementi con indice minore di 3.",
                result: JSON.stringify([10, 20, 30, 40, 50].filter((item, index) => index < 3))
            },
            {
                level: "facile",
                title: "Pari e dispari per indice",
                description: "Sostituisce gli elementi in base all'indice pari o dispari.",
                result: JSON.stringify([10, 20, 30, 40, 50].map((item, index) => index % 2 === 0 ? "Pari" : "Dispari"))
            },
            {
                level: "medio",
                title: "Inverti e raddoppia",
                description: "Inverte [10, 20, 30, 40, 50] e raddoppia ogni elemento.",
                result: JSON.stringify([10, 20, 30, 40, 50].slice().reverse().map((number) => number * 2))
            },
            {
                level: "medio",
                title: "Filtra numeri",
                description: "Da un array misto conserva solo i valori numerici.",
                result: JSON.stringify([72, "testo", 69, "altro", 911].filter((item) => typeof item === "number"))
            },
            {
                level: "medio",
                title: "Array piu lungo",
                description: "Confronta due array e restituisce quello con piu elementi.",
                result: JSON.stringify([2, 3, 4])
            },
            {
                level: "difficile",
                title: "Somme di due array",
                description: "Somma separatamente [80, 13, 99] e [25, 74, 33].",
                result: JSON.stringify([[80, 13, 99].reduce((sum, number) => sum + number, 0), [25, 74, 33].reduce((sum, number) => sum + number, 0)])
            },
            {
                level: "difficile",
                title: "Concatena, ordina e raddoppia",
                description: "Unisce due array, ordina i numeri in modo crescente e li raddoppia.",
                result: JSON.stringify([4, 1, 7].concat([2, 9, 3]).sort((a, b) => a - b).map((number) => number * 2))
            }
        ];

        const grid = document.querySelector("#exerciseGrid");
        const filterButtons = document.querySelectorAll("[data-filter]");

        function renderExercises(filter = "all") {
            grid.innerHTML = "";

            exercises
                .filter((exercise) => filter === "all" || exercise.level === filter)
                .forEach((exercise, index) => {
                    const card = document.createElement("article");
                    card.className = `exercise-card ${exercise.level}`;
                    card.innerHTML = `
                        <div class="card-top">
                            <span class="level">${exercise.level}</span>
                            <span class="number">#${String(index + 1).padStart(2, "0")}</span>
                        </div>
                        <h2>${exercise.title}</h2>
                        <p>${exercise.description}</p>
                        <output>${exercise.result}</output>
                    `;
                    grid.appendChild(card);
                });
        }

        filterButtons.forEach((button) => {
            button.addEventListener("click", function () {
                filterButtons.forEach((item) => item.classList.remove("is-active"));
                button.classList.add("is-active");
                renderExercises(button.dataset.filter);
            });
        });

        renderExercises();
    </script>
</body>
</html>
